<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Blank</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body style="background: #f3f4f6;">
  <div id="root"></div>

  <!-- React + Babel CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

  <script src="app/hashManager.js"></script>

  <script>
    window.APP_BUILD = 'test';
    (async function boot() {
      async function load(url) {
        var code = await (await fetch(url)).text();
        try {
          var out = Babel.transform(code, {
            presets: ['env', 'react'],
            filename: url,
            sourceMaps: 'inline'
          }).code;
          out += '\n//# sourceURL=' + url;
          var s = document.createElement('script');
          s.textContent = out;
          document.body.appendChild(s);
        } catch (err) {
          console.error('[Babel Error in ' + url + ']', err.message);
        }
      }
      // Core setup (API_BASE, build helpers, field registry)
      await load('app/collections.js?v=test');
      // Collection schemas
      await load('app/collections/posts.js?v=test');
      await load('app/collections/blog_authors.js?v=test');
      await load('app/collections/blog_categories.js?v=test');
      await load('app/collections/media.js?v=test');
      await load('app/collections/media_publishers.js?v=test');
      await load('app/collections/services.js?v=test');
      await load('app/collections/services_categories.js?v=test');
      await load('app/collections/team.js?v=test');
      await load('app/collections/team_categories.js?v=test');
      await load('app/collections/faq.js?v=test');
      await load('app/collections/faq_categories.js?v=test');
      await load('app/collections/portfolio.js?v=test');
      await load('app/collections/portfolio_categories.js?v=test');
      await load('app/collections/legal.js?v=test');
      // Build final COLLECTIONS object
      await load('app/collections-init.js?v=test');
      await load('app/helpers.js?v=test');
      await load('app/components/OutlineIcon.js?v=test');
      await load('app/components/ToastContainer.js?v=test');
      await load('app/components/AlertBox.js?v=test');
      await load('app/components/Breadcrumbs.js?v=test');
      await load('app/components/BackendWarning.js?v=test');
      await load('app/components/Layout.js?v=test');
      await load('app/components/QuillEditor.js?v=test');
      await load('app/components/FormFields.js?v=test');
      await load('app/components/ListPage.js?v=test');
      await load('app/components/EditorPage.js?v=test');

      // Test: render component status
      var testCode = 'var root = ReactDOM.createRoot(document.getElementById("root"));'
        + 'root.render(React.createElement("div", null,'
        + '  React.createElement("h1", {style:{padding:"2rem"}}, "Test Blank - Components loaded OK"),'
        + '  React.createElement("p", {style:{padding:"0 2rem",color:"#6b7280"}},'
        + '    "Layout: " + typeof window.Layout'
        + '    + ", ListPage: " + typeof window.ListPage'
        + '    + ", EditorPage: " + typeof window.EditorPage'
        + '    + ", QuillEditor: " + typeof window.QuillEditor'
        + '    + ", ToastContainer: " + typeof window.ToastContainer'
        + '  )'
        + '));';
      var s = document.createElement('script');
      s.textContent = testCode;
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
            const isExiting = t.phase === 'exit';
            return (
              <div
                key={t.id}
                style={{ 
                  ...s,
                  padding: '0.6rem 1rem',
                  borderRadius: '0.6rem',
                  fontSize: '0.8rem',
                  fontWeight: 400,
                  boxShadow: '0 4px 16px rgba(0,0,0,0.22)',
                  border: '1px solid ' + s.borderColor,
                  maxWidth: '22rem',
                  pointerEvents: 'auto',
                  opacity: isEntering ? 0 : isExiting ? 0 : 1,
                  transform: isEntering ? 'translateY(8px)' : isExiting ? 'translateY(6px)' : 'translateY(0)',
                  transition: 'opacity 220ms ease, transform 220ms ease'
                }}
              >
                {t.message}
              </div>
            );
          })}
        </div>,
        document.body
      );
    };
  </script>
</body>
</html>
