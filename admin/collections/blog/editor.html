<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor — StupidCMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../styles/styles.css" />
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <style>
    .ql-toolbar { border-radius: 0.75rem 0.75rem 0 0 !important; border-color: #e5e7eb !important; }
    .ql-container { border-radius: 0 0 0.75rem 0.75rem !important; border-color: #e5e7eb !important; font-size: 1rem; min-height: 320px; }

    /* Golden ratio typography inside editor: base 1rem, ×1.618 up */
    .ql-editor { min-height: 300px; line-height: 1.75; color: #374151; font-size: 1rem; }
    .ql-editor h2 { font-size: 1.618rem; font-weight: 700; line-height: 1.3; color: #111827; margin: 1.618em 0 0.5em; }
    .ql-editor h3 { font-size: 1rem; font-weight: 600; line-height: 1.4; color: #1f2937; margin: 1.3em 0 0.4em; letter-spacing: 0.01em; }
    .ql-editor p  { margin: 0 0 1em; }
    .ql-editor ul, .ql-editor ol { padding-left: 1.5em; margin: 0 0 1em; }
    .ql-editor li { margin-bottom: 0.4em; }
    .ql-editor strong { font-weight: 600; color: #111827; }
    .ql-editor em { font-style: italic; color: #4b5563; }
    .ql-editor.ql-blank::before { color: #d1d5db; font-style: normal; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

  <div id="appNav"></div>
  <script src="../../components/nav.js"></script>

  <section class="uk-section">
  <div class="uk-container space-y-6">

    <!-- Breadcrumbs -->
    <nav class="uk-breadcrumbs mb-6">
      <a href="dashboard.html" class="uk-breadcrumb-link">Dashboard</a>
      <span class="uk-breadcrumb-sep">/</span>
      <a href="blog.html" class="uk-breadcrumb-link" id="breadcrumbSection">Posts</a>
      <span class="uk-breadcrumb-sep">/</span>
      <span id="breadcrumbTitle" class="uk-breadcrumb-current">New Post</span>
    </nav>

    <!-- Header buttons -->
    <div class="flex items-center gap-2 mb-6" id="editorHeader">
      <button id="cancelBtn" class="uk-button uk-button-secondary">Cancel</button>
      <button id="saveBtn" class="uk-button-primary flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-white/0 transition-all duration-200" id="dirtyDot"></span>
        <span id="saveBtnLabel">Save</span>
      </button>
    </div>

    <!-- Title -->
    <div>
      <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-2">
        Title <span class="text-red-400 normal-case font-normal tracking-normal">*</span>
      </label>
      <input
        id="title"
        type="text"
        class="w-full text-2xl font-semibold text-gray-900 bg-transparent border-b border-gray-200 pb-2 focus:outline-none focus:border-gray-900 transition"
        placeholder="Post title..."
      />
      <p id="titleError" class="text-xs text-red-400 mt-1 hidden">Title is required</p>
    </div>

    <!-- Author -->
    <div>
      <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-2">Author</label>
      <input
        id="author"
        type="text"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition"
        placeholder="Bobby"
      />
    </div>

    <!-- Cover Image -->
    <div>
      <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-2">Cover Image</label>
      <div class="border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center hover:border-gray-400 transition cursor-pointer" onclick="document.getElementById('imageInput').click()">
        <img id="imagePreview" src="" alt="" class="hidden w-full max-h-56 object-cover rounded-xl mb-3" />
        <p id="imagePlaceholder" class="text-sm text-gray-400">Click to upload image</p>
        <p class="text-xs text-gray-300 mt-1">Cloudinary upload — coming next</p>
        <input id="imageInput" type="file" accept="image/*" class="hidden" onchange="previewImage(event)" />
      </div>
      <input id="imageUrl" type="text"
        class="w-full mt-2 px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-900 transition"
        placeholder="Or paste image URL..."
        oninput="previewUrl(this.value)"
      />
    </div>

    <!-- Content -->
    <div>
      <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-2">Content</label>
      <div id="quillEditor" class="bg-white"></div>
    </div>

    <p id="statusMsg" class="text-sm text-center text-gray-400 hidden"></p>

  </div>
  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('id');

    // Mock existing post
    const MOCK_POSTS = {
      '1': {
        title: 'Why I Switched to a Standing Desk',
        author: 'Bobby',
        image_url: 'https://picsum.photos/seed/desk/800/400',
        content: 'After years of back pain I finally made the switch. Here is everything I learned along the way...',
      }
    };

    // Apply site direction per site_id
    const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
    const siteDir = localStorage.getItem('site_dir_' + currentUser.site_id) || 'ltr';
    document.getElementById('title').dir = siteDir;
    document.getElementById('author').dir = siteDir;

    // Breadcrumb: section from URL param
    const section = params.get('section') || 'Posts';
    document.getElementById('breadcrumbSection').textContent = section;

    // Breadcrumb: show username's posts
    if (currentUser.username) {
      // username available if needed
    }

    // Breadcrumb title
    if (postId && MOCK_POSTS[postId]) {
      document.getElementById('breadcrumbTitle').textContent = MOCK_POSTS[postId].title;
    }

    // Init Quill
    const quill = new Quill('#quillEditor', {
      theme: 'snow',
      placeholder: 'Write your post here...',
      modules: {
        toolbar: [
          [{ header: [2, 3, false] }],
          ['bold', 'italic'],
          [{ list: 'ordered' }, { list: 'bullet' }],
          ['image'],
          ['clean']
        ]
      }
    });

    // Apply writing direction to Quill content only (not layout)
    quill.root.style.direction = siteDir;
    quill.root.style.textAlign = siteDir === 'rtl' ? 'right' : 'left';

    // Load if editing
    if (postId && MOCK_POSTS[postId]) {
      const p = MOCK_POSTS[postId];
      document.getElementById('title').value = p.title;
      document.getElementById('author').value = p.author;
      document.getElementById('imageUrl').value = p.image_url;
      quill.root.innerHTML = p.content;
      if (p.image_url) showPreview(p.image_url);
    }

    function showPreview(url) {
      const img = document.getElementById('imagePreview');
      const ph = document.getElementById('imagePlaceholder');
      img.src = url;
      img.classList.remove('hidden');
      ph.classList.add('hidden');
    }

    function previewImage(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => showPreview(ev.target.result);
      reader.readAsDataURL(file);
    }

    function previewUrl(url) {
      if (url) showPreview(url);
    }

    // Dirty state
    let isDirty = false;
    function markDirty() {
      if (isDirty) return;
      isDirty = true;
      document.getElementById('dirtyDot').classList.replace('bg-white/0', 'bg-white/80');
      document.getElementById('saveBtnLabel').textContent = 'Save changes';
      document.getElementById('saveBtn').classList.replace('bg-blue-600', 'bg-blue-700');
    }
    function markClean() {
      isDirty = false;
      document.getElementById('dirtyDot').classList.replace('bg-white/80', 'bg-white/0');
      document.getElementById('saveBtnLabel').textContent = 'Save';
      document.getElementById('saveBtn').classList.replace('bg-blue-700', 'bg-blue-600');
    }
    ['title','author','imageUrl'].forEach(id => {
      document.getElementById(id).addEventListener('input', markDirty);
    });
    quill.on('text-change', markDirty);

    document.getElementById('cancelBtn').addEventListener('click', () => {
      window.location.href = 'blog.html';
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      const titleVal = document.getElementById('title').value.trim();
      if (!titleVal) {
        document.getElementById('titleError').classList.remove('hidden');
        document.getElementById('title').focus();
        return;
      }
      document.getElementById('titleError').classList.add('hidden');

      const btn = document.getElementById('saveBtn');
      const label = document.getElementById('saveBtnLabel');
      const payload = {
        id: postId,
        title: titleVal,
        author: document.getElementById('author').value,
        image_url: document.getElementById('imageUrl').value,
        content: quill.root.innerHTML,
      };

      // TODO: GraphQL mutation createPost / updatePost
      console.log('Save payload:', payload);

      btn.disabled = true;
      label.textContent = 'Saving...';
      setTimeout(() => {
        label.textContent = '✓ Saved';
        btn.classList.replace('bg-blue-600', 'bg-green-600');
        btn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
        markClean();
        setTimeout(() => {
          label.textContent = 'Save';
          btn.classList.replace('bg-green-600', 'bg-blue-600');
          btn.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
          btn.disabled = false;
        }, 2000);
      }, 600);
    });
  </script>
</body>
</html>
