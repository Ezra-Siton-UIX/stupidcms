<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ — StupidCMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../styles/styles.css" />
</head>
<body class="min-h-screen bg-gray-50">

  <div id="appNav"></div>
  <script src="../../components/nav.js"></script>

  <section class="uk-section">
  <div class="uk-container">

    <!-- Breadcrumbs -->
    <nav class="uk-breadcrumbs mb-6">
      <a href="../blog/dashboard.html" class="uk-breadcrumb-link">Dashboard</a>
      <span class="uk-breadcrumb-sep">/</span>
      <span class="uk-breadcrumb-current">FAQ</span>
    </nav>

    <div class="flex items-center justify-between mb-6">
      <h1 class="text-xl font-semibold text-gray-900">FAQ</h1>
      <a href="faq-editor.html?section=FAQ" class="uk-button-primary">
        + New Question
      </a>
    </div>

    <!-- FAQ list -->
    <div id="faqList" class="uk-list"></div>

  </div>
  </section>

  <script>
    const MOCK_FAQ = [];

    function deleteFaq(id) {
      if (!confirm('Delete this question?')) return;
      // TODO: GraphQL mutation
      window.showAlert('Delete connected to database coming next.');
    }

    function renderFaq(items) {
      const list = document.getElementById('faqList');
      if (!items.length) {
        list.innerHTML = `<p class="text-sm text-gray-400">No questions yet. Add your first one!</p>`;
        return;
      }
      list.innerHTML = items.map(item => `
        <a href="faq-editor.html?id=${item.id}" class="group uk-card cursor-pointer" style="display:flex;gap:1rem;align-items:center;">
          <div class="uk-img-avatar flex items-center justify-center text-gray-400 text-lg font-semibold">?</div>
          <div class="flex-1 min-w-0">
            <h2 class="uk-text-headline group-hover:text-blue-600 transition">${item.question}</h2>
            <p class="uk-text-meta">
              ${item.slug ? `<span class="font-mono text-gray-300">/${item.slug}</span>` : ''}
            </p>
          </div>
          <div class="flex gap-2 flex-shrink-0" onclick="event.preventDefault()">
            <button onclick="deleteFaq('${item.id}')" class="uk-button-delete">Delete</button>
          </div>
        </a>
      `).join('');
    }

    renderFaq(MOCK_FAQ);

    // Update nav counts
    const prevCounts = JSON.parse(localStorage.getItem('nav_counts') || '{}');
    setNavCounts({ ...prevCounts, faq: MOCK_FAQ.length });
  </script>
</body>
</html>
