<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ Editor — StupidCMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../styles/styles.css" />
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <style>
    .ql-toolbar { border-radius: 0.75rem 0.75rem 0 0 !important; border-color: #e5e7eb !important; }
    .ql-container { border-radius: 0 0 0.75rem 0.75rem !important; border-color: #e5e7eb !important; font-size: 1rem; min-height: 320px; }
    .ql-editor { min-height: 300px; line-height: 1.75; color: #374151; font-size: 1rem; }
    .ql-editor h2 { font-size: 1.618rem; font-weight: 700; line-height: 1.3; color: #111827; margin: 1.618em 0 0.5em; }
    .ql-editor h3 { font-size: 1rem; font-weight: 600; line-height: 1.4; color: #1f2937; margin: 1.3em 0 0.4em; letter-spacing: 0.01em; }
    .ql-editor p  { margin: 0 0 1em; }
    .ql-editor ul, .ql-editor ol { padding-left: 1.5em; margin: 0 0 1em; }
    .ql-editor li { margin-bottom: 0.4em; }
    .ql-editor strong { font-weight: 600; color: #111827; }
    .ql-editor em { font-style: italic; color: #4b5563; }
    .ql-editor.ql-blank::before { color: #d1d5db; font-style: normal; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

  <div id="appNav"></div>
  <script src="../../components/nav.js"></script>

  <section class="uk-section">
  <div class="uk-container space-y-6">

    <!-- Breadcrumbs -->
    <nav class="uk-breadcrumbs mb-6">
      <a href="../blog/dashboard.html" class="uk-breadcrumb-link">Dashboard</a>
      <span class="uk-breadcrumb-sep">/</span>
      <a href="faq.html" class="uk-breadcrumb-link" id="breadcrumbSection">FAQ</a>
      <span class="uk-breadcrumb-sep">/</span>
      <span id="breadcrumbTitle" class="uk-breadcrumb-current">New Question</span>
    </nav>

    <!-- Header buttons -->
    <div class="flex items-center gap-2 mb-6" id="editorHeader">
      <button id="cancelBtn" class="uk-button uk-button-secondary">Cancel</button>
      <button id="saveBtn" class="uk-button-primary flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-white/0 transition-all duration-200" id="dirtyDot"></span>
        <span id="saveBtnLabel">Save</span>
      </button>
    </div>

    <!-- Question -->
    <div>
      <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-2">
        Question <span class="text-red-400 normal-case font-normal tracking-normal">*</span>
      </label>
      <input
        id="question"
        type="text"
        class="w-full text-2xl font-semibold text-gray-900 bg-transparent border-b border-gray-200 pb-2 focus:outline-none focus:border-gray-900 transition"
        placeholder="Your question..."
      />
      <p id="questionError" class="text-xs text-red-400 mt-1 hidden">Question is required</p>
    </div>

    <!-- Slug -->
    <div>
      <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-2">
        Slug <span class="text-red-400 normal-case font-normal tracking-normal">*</span>
      </label>
      <div class="flex items-center gap-0 border border-gray-200 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-gray-900 transition">
        <span class="px-3 py-2 bg-gray-50 text-gray-400 text-sm font-mono border-r border-gray-200 select-none">/faq/</span>
        <input id="slug" type="text"
          class="flex-1 px-3 py-2 text-sm font-mono text-gray-700 bg-white focus:outline-none"
          placeholder="how-to-use" />
      </div>
      <p id="slugError" class="text-xs text-red-400 mt-1 hidden">Slug is required</p>
      <p class="text-xs text-gray-300 mt-1">lowercase, hyphens only — auto-generated from question</p>
    </div>

    <!-- Answer -->
    <div>
      <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-2">Answer</label>
      <div id="quillEditor" class="bg-white"></div>
    </div>

    <p id="statusMsg" class="text-sm text-center text-gray-400 hidden"></p>

  </div>
  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const faqId = params.get('id');

    // Mock existing FAQs
    const MOCK_FAQ = {
      '1': {
        question: 'How do I create a new blog post?',
        slug: 'create-blog-post',
        answer: '<p>Click the <strong>+ New Post</strong> button on the dashboard. Fill in the title, content, and image. Hit save!</p>',
      }
    };

    // Apply site direction per site_id
    const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
    const siteDir = localStorage.getItem('site_dir_' + currentUser.site_id) || 'ltr';
    document.getElementById('question').dir = siteDir;
    document.getElementById('slug').dir = siteDir;

    // Breadcrumb title
    if (faqId && MOCK_FAQ[faqId]) {
      document.getElementById('breadcrumbTitle').textContent = MOCK_FAQ[faqId].question;
    }

    // Init Quill
    const quill = new Quill('#quillEditor', {
      theme: 'snow',
      placeholder: 'Write your answer here...',
      modules: {
        toolbar: [
          [{ header: [2, 3, false] }],
          ['bold', 'italic'],
          [{ list: 'ordered' }, { list: 'bullet' }],
          ['image'],
          ['clean']
        ]
      }
    });

    // Apply writing direction to Quill content only (not layout)
    quill.root.style.direction = siteDir;
    quill.root.style.textAlign = siteDir === 'rtl' ? 'right' : 'left';

    // Load if editing
    if (faqId && MOCK_FAQ[faqId]) {
      const f = MOCK_FAQ[faqId];
      document.getElementById('question').value = f.question;
      document.getElementById('slug').value = f.slug;
      quill.root.innerHTML = f.answer;
    }

    // Auto-generate slug from question
    document.getElementById('question').addEventListener('input', function () {
      if (!faqId) { // only auto-generate for new entries
        document.getElementById('slug').value = this.value
          .toLowerCase().trim()
          .replace(/[^\w\s-?]/g, '')
          .replace(/[\s?]+/g, '-')
          .replace(/^-+|-+$/g, '');
      }
      markDirty();
    });

    // Dirty state
    let isDirty = false;
    function markDirty() {
      if (isDirty) return;
      isDirty = true;
      document.getElementById('dirtyDot').classList.replace('bg-white/0', 'bg-white/80');
      document.getElementById('saveBtnLabel').textContent = 'Save changes';
      document.getElementById('saveBtn').classList.replace('bg-blue-600', 'bg-blue-700');
    }
    function markClean() {
      isDirty = false;
      document.getElementById('dirtyDot').classList.replace('bg-white/80', 'bg-white/0');
      document.getElementById('saveBtnLabel').textContent = 'Save';
      document.getElementById('saveBtn').classList.replace('bg-blue-700', 'bg-blue-600');
    }
    ['question','slug'].forEach(id => {
      document.getElementById(id).addEventListener('input', markDirty);
    });
    quill.on('text-change', markDirty);

    document.getElementById('cancelBtn').addEventListener('click', () => {
      window.location.href = 'faq.html';
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      const questionVal = document.getElementById('question').value.trim();
      const slugVal = document.getElementById('slug').value.trim();

      let valid = true;
      if (!questionVal) {
        document.getElementById('questionError').classList.remove('hidden');
        document.getElementById('question').focus();
        valid = false;
      } else {
        document.getElementById('questionError').classList.add('hidden');
      }
      
      if (!slugVal) {
        document.getElementById('slugError').classList.remove('hidden');
        valid = false;
      } else {
        document.getElementById('slugError').classList.add('hidden');
      }

      if (!valid) return;

      const btn = document.getElementById('saveBtn');
      const label = document.getElementById('saveBtnLabel');
      const payload = {
        id: faqId,
        question: questionVal,
        slug: slugVal,
        answer: quill.root.innerHTML,
      };

      // TODO: GraphQL mutation createFaq / updateFaq
      console.log('Save payload:', payload);

      btn.disabled = true;
      label.textContent = 'Saving...';
      setTimeout(() => {
        label.textContent = '✓ Saved';
        btn.classList.replace('bg-blue-600', 'bg-green-600');
        btn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
        markClean();
        setTimeout(() => {
          label.textContent = 'Save';
          btn.classList.replace('bg-green-600', 'bg-blue-600');
          btn.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
          btn.disabled = false;
        }, 2000);
      }, 600);
    });
  </script>
</body>
</html>
