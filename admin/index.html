<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Client | StupidCMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles/styles.css" />
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <style>
    .ql-toolbar { border-radius: 0.75rem 0.75rem 0 0 !important; border-color: #e5e7eb !important; }
    .ql-container { border-radius: 0 0 0.75rem 0.75rem !important; border-color: #e5e7eb !important; font-size: 1rem; min-height: 320px; }
    .ql-editor { min-height: 300px; line-height: 1.75; color: #374151; font-size: 1rem; }
    .ql-editor h2 { font-size: 1.618rem; font-weight: 700; line-height: 1.3; color: #111827; margin: 1.618em 0 0.5em; }
    .ql-editor h3 { font-size: 1rem; font-weight: 600; line-height: 1.4; color: #1f2937; margin: 1.3em 0 0.4em; letter-spacing: 0.01em; }
    .ql-editor p  { margin: 0 0 1em; }
    .ql-editor ul, .ql-editor ol { padding-left: 1.5em; margin: 0 0 1em; }
    .ql-editor li { margin-bottom: 0.4em; }
    .ql-editor strong { font-weight: 600; color: #111827; }
    .ql-editor em { font-style: italic; color: #4b5563; }
    .ql-editor.ql-blank::before { color: #d1d5db; font-style: normal; }
    .backend-warning[data-status="checking"] { display: none !important; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

  <div id="root"></div>

  <!-- CDN Libraries -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

  <script src="app/hashManager.js"></script>

  <!-- Load JSX files via Babel -->
  <script>
    window.APP_BUILD = 'stupidcms-admin-2026-03-24-as';

    (async function boot() {
      async function load(url) {
        var code = await (await fetch(url)).text();
        var out = Babel.transform(code, { presets: ['react'] }).code;
        var s = document.createElement('script');
        s.textContent = out;
        document.body.appendChild(s);
      }
      var build = encodeURIComponent(window.APP_BUILD);
      await load('app/collections.js?v=' + build);
      await load('app/components.js?v=' + build);
      await load('app/App.js?v=' + build);
    })();
  </script>

</body>
</html>
